# --- BRIDAGE DU POOL DE CONNEXIONS (Clever Cloud Limit = 5) ---
# Nombre max de connexions actives
spring.datasource.hikari.maximum-pool-size=3
# Nombre minimum de connexions gardées au repos
spring.datasource.hikari.minimum-idle=1
# Temps max avant de fermer une connexion inactive (30s)
spring.datasource.hikari.idle-timeout=30000
# Temps d'attente max pour obtenir une connexion (30s)
spring.datasource.hikari.connection-timeout=30000
# Durée de vie max d'une connexion (4min)
spring.datasource.hikari.max-lifetime=240000
# Fréquence de test (30s)
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# File Size Limits
