server.port=${PORT:8080}

# =========================================================================
# Configuration Base de Données
# En production (Railway) : les variables d'environnement SPRING_DATASOURCE_*
# sont injectées automatiquement. Les valeurs après ':' sont les fallbacks locaux.
# =========================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://bkvi6ddosed0xdgigxvv-mysql.services.clever-cloud.com:3306/bkvi6ddosed0xdgigxvv?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:u7heg9h4jiqkmyed}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:HP90kPr9O5zYE13uQenx}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update = crée/met à jour les tables automatiquement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Pour éviter les problèmes CORS pendant le développement (Frontend sur autre port/fichier)
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=*
spring.mvc.cors.allowed-headers=*

# --- OPTIMISATION HIKARICP (Base distante) ---
# Durée de vie max d'une connexion (doit être < au timeout du serveur, souvent 5min sur cloud)
spring.datasource.hikari.max-lifetime=240000
# Fréquence de test pour garder la connexion active
spring.datasource.hikari.keepalive-time=30000
# Temps d'attente max pour obtenir une connexion
spring.datasource.hikari.connection-timeout=30000
# Requête de test simple
spring.datasource.hikari.connection-test-query=SELECT 1

# Taille maximum des fichiers (10MB pour correspondre au WebSocket)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Clé API Groq (AntIA) - injecté via variable d'environnement en prod
groq.api.key=${GROQ_API_KEY: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}

